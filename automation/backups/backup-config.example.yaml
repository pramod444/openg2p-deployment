# =============================================================================
# OpenG2P Backup Automation Configuration
# =============================================================================
# Copy this file to backup-config.yaml and fill in your values:
#   cp backup-config.example.yaml backup-config.yaml
#
# Then run on your laptop:
#   ./openg2p-backup.sh install --config backup-config.yaml
#
# Architecture (see operations/deployment/automation/backups.md):
#   • A 4th "backup" node, on the same VPC/LAN as RP/compute/storage.
#   • SSHes outward to RP, compute, storage to pull data.
#   • Holds pgBackRest repo, restic repos, etcd snapshots, rancher-backup
#     tarballs — all on a dedicated data volume mounted at backup_host.repo_root.
#
# Two files contribute to the orchestrator's effective config:
#
#   1. backup-config.yaml         — THIS FILE — your preferences:
#                                    encryption, retention, schedules, what to
#                                    back up.
#
#   2. provision-output.yaml      — auto-generated by aws/openg2p-aws-provision.sh
#                                    when backup_node.enabled=true. Contains the
#                                    backup node's IP, SSH paths, etc. Loaded
#                                    AFTER this file — its keys win on conflict.
#
# Keys are tagged:
#   [USER]   — set yourself
#   [AWS]    — auto-populated by aws-provision into provision-output.yaml.
#              For non-AWS installs, set here.
# =============================================================================

# ---------------------------------------------------------------------------
# Production cluster reference                                          [USER]
# ---------------------------------------------------------------------------
# Path to the prod-config.yaml that drives the 3-node cluster being backed up.
# Relative paths resolve against this file's directory.
# The backup orchestrator reads SSH details for RP/compute/storage from here.
prod_config: "../production/prod-config.yaml"

# ---------------------------------------------------------------------------
# Backup host (4th node)                                                 [AWS]
# ---------------------------------------------------------------------------
backup_private_ip: ""
backup_ssh_host:   ""              # defaults to backup_private_ip if blank
backup_ssh_user:   "ubuntu"
backup_ssh_key:    "~/.ssh/id_rsa"

# Where all repo data lives on the backup host (separate data volume strongly
# recommended). The orchestrator creates this directory and chowns it for the
# backup user during install.
backup_repo_root: "/var/lib/openg2p-backup"

# ---------------------------------------------------------------------------
# Encryption                                                            [USER]
# ---------------------------------------------------------------------------
# Operator-supplied passphrases. Custody = your p12 keystore (per project
# convention). The orchestrator reads each file from the LAPTOP at install
# time and writes mode-0600 copies onto the backup host. Files are NEVER
# committed to git. Each must contain a single line, the passphrase.
#
# If a path is left blank, the orchestrator generates a random passphrase
# during install and writes it back here for you to move into the keystore.
restic_passphrase_file:     "~/.openg2p/keystore/restic.pass"
pgbackrest_passphrase_file: "~/.openg2p/keystore/pgbackrest.pass"

# Etcd encryption-at-rest key (only used if --enable-secret-encryption is
# passed to `install`). Same custody rules.
etcd_at_rest_key_file: "~/.openg2p/keystore/etcd-aescbc.key"

# ---------------------------------------------------------------------------
# Group toggles — independently switchable                              [USER]
# ---------------------------------------------------------------------------
# Each group is opt-out. Disabling a group skips its install steps, cron
# entries, run/verify/drill subcommands. `status` reports it as 'disabled'.
groups:
  pg:       true     # PostgreSQL via pgBackRest (storage node)
  etcd:     true     # RKE2 etcd snapshots (compute node)
  rancher:  true     # rancher-backup operator (Secrets, CMs, PV/PVCs, CRs)
  nfs:      true     # NFS data via restic + PVC sidecar manifest
  configs:  true     # WG, Nginx, local CA, RKE2 FS state via restic over SSH

# ---------------------------------------------------------------------------
# Retention defaults — aimed at ~6 months of granular history          [USER]
# ---------------------------------------------------------------------------
retention:
  # pgBackRest
  pg_full_count: 4              # keep 4 fulls (~4 weeks rolling)
  pg_diff_count: 7              # keep 7 differentials
  pg_wal_days:   30             # WAL archive retention (PITR window)

  # RKE2 etcd
  etcd_snapshot_count: 28       # ~7 days at 6-hourly

  # rancher-backup operator
  rancher_backup_count: 14      # 14 nightly tarballs

  # restic (NFS, configs)
  keep_daily:   7
  keep_weekly:  4
  keep_monthly: 6

# ---------------------------------------------------------------------------
# Schedules — cron expressions, all on the backup host                  [USER]
# ---------------------------------------------------------------------------
schedules:
  pg_full:    "0 2 * * 0"       # Sunday 02:00 — full
  pg_diff:    "0 2 * * 1-6"     # Mon-Sat 02:00 — differential
  etcd_pull:  "15 */6 * * *"    # every 6h, +15m offset
  rancher:    "0 3 * * *"       # nightly 03:00
  nfs:        "30 3 * * *"      # nightly 03:30
  configs:    "30 3 * * *"      # nightly 03:30 (parallel with nfs)
  drill:      "0 5 * * 0"       # Sunday 05:00 — weekly verify + dry-run

# ---------------------------------------------------------------------------
# PostgreSQL settings                                                   [USER]
# ---------------------------------------------------------------------------
pg:
  stanza_name: "openg2p"        # pgBackRest stanza identifier
  parallel_jobs: 4              # backup parallelism
  archive_timeout_seconds: 60   # forces WAL switch — bounds RPO
  # Optional: a canary table the drill harness SELECTs from after restore.
  # Leave blank to skip canary check (drill verifies pgBackRest 'verify' only).
  canary_table: ""

# ---------------------------------------------------------------------------
# NFS data — explicit allowlist                                         [USER]
# ---------------------------------------------------------------------------
# Each path is mounted READ-ONLY on the backup host (NFS export from storage
# node) and walked by restic. Anything not listed is NOT backed up.
nfs:
  # The NFS export root on the storage node. The orchestrator mounts this
  # read-only on the backup host at /mnt/openg2p-nfs-ro.
  export_root: "/srv/nfs/openg2p"

  # Subdirectories of export_root to back up. Matches OpenG2P's per-cluster
  # export layout. Add per-environment subpaths as you create environments.
  paths:
    - "."                       # the whole export root
  exclude:
    - "**/logs/**"
    - "**/tmp/**"
    - "**/.snapshots/**"

# ---------------------------------------------------------------------------
# rancher-backup ResourceSet                                            [USER]
# ---------------------------------------------------------------------------
# Curated to capture state that DOES NOT come back from a fresh helmfile
# install. See operations/deployment/automation/backups/what-gets-backed-up.md
# for the rationale.
#
# At install time the orchestrator validates each entry against the live
# cluster (`kubectl api-resources`) and warns about any unknown GVK.
resource_set:
  include_namespaces: ["*"]
  exclude_namespaces:
    - kube-system
    - kube-public
    - kube-node-lease
  include_resources:
    - secrets
    - configmaps
    - persistentvolumes
    - persistentvolumeclaims
    - namespaces
    - serviceaccounts
  include_groups:
    - management.cattle.io
    - cert-manager.io
    - monitoring.coreos.com
    - networking.istio.io
    - security.istio.io
    - keycloak.org
    - logging.banzaicloud.io

# ---------------------------------------------------------------------------
# Etcd encryption-at-rest                                               [USER]
# ---------------------------------------------------------------------------
# DEFAULT: disabled. Enabling flips --encryption-provider-config on the
# kube-apiserver and restarts rke2-server (apiserver unavailable ~30-60s,
# workloads keep running). Run during a maintenance window:
#   ./openg2p-backup.sh install --enable-secret-encryption
#
# Once enabled, the orchestrator rewrites all existing Secrets so they're
# stored as ciphertext in etcd. Apps see no change (apiserver decrypts on
# read). Backward compatible.
etcd_encryption:
  enabled: false

# ---------------------------------------------------------------------------
# Tool versions                                                         [USER]
# ---------------------------------------------------------------------------
# Defaults pinned to known-good versions. apt installs are version-pinned
# where the distro permits; restic and rancher-backup-operator are pulled
# from internal mirrors via these tags.
versions:
  pgbackrest: ""                # blank → use distro package
  restic: "0.17.3"
  rancher_backup_chart: "7.0.0"

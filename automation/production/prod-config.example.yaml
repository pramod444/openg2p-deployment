# =============================================================================
# OpenG2P 3-Node Production Infrastructure Configuration
# =============================================================================
# Copy this file to prod-config.yaml and fill in your values:
#   cp prod-config.example.yaml prod-config.yaml
#
# Then run on your laptop:
#   ./openg2p-prod.sh --config prod-config.yaml
#
# Architecture:
#   • Reverse Proxy node — Nginx (TLS terminator), Wireguard server, dnsmasq, local CA
#   • Compute node       — RKE2 single control-plane, Istio, Rancher, Keycloak, monitoring, logging
#   • Storage node       — NFS server, Postgres host service (ready for env automation)
#
# Admin tools (Rancher, Keycloak) are reachable ONLY via Wireguard, on hostnames
# under the internal_domain (e.g. rancher.openg2p.internal). The script generates
# a local CA and self-signs certs for those hostnames; install the CA cert on
# your laptop after first install.
#
# Customer-supplied public domains and certs come later, with environment automation.
# =============================================================================
#
# Two files contribute to the orchestrator's effective config:
#
#   1. prod-config.yaml          — THIS FILE — your preferences:
#                                  cluster_name, internal_domain, versions,
#                                  keycloak_admin_email, postgres settings
#
#   2. provision-output.yaml     — auto-generated by aws/openg2p-aws-provision.sh
#                                  if you use that script. Contains the
#                                  AWS-derived values (IPs, SSH paths,
#                                  private_subnet, wg_endpoint).
#                                  The orchestrator loads this file AFTER
#                                  prod-config.yaml — its keys win on conflict.
#
# Keys below are tagged:
#   [USER]   — set this yourself
#   [AWS]    — auto-populated by aws-provision into provision-output.yaml.
#              For a non-AWS install, set it here in prod-config.yaml.
# =============================================================================

# ---------------------------------------------------------------------------
# Cluster identity                                                       [USER]
# ---------------------------------------------------------------------------
# Display name for the Rancher cluster (also used for NFS export path prefix).
# AWS provision overrides this with the project name from aws-config.yaml.
cluster_name: "openg2p"

# Internal TLD for admin tools — see header note. Default is .openg2p.internal.
# .internal is ICANN-reserved (2024) for private use, so it will never clash
# with public DNS. Change only if it conflicts with an existing private zone
# in the customer's network.
internal_domain: "openg2p.internal"

# ---------------------------------------------------------------------------
# Reverse Proxy node                                                      [AWS]
# ---------------------------------------------------------------------------
# All AWS-derived. For non-AWS installs, fill in manually.
# rp_public_ip is the Wireguard endpoint admin laptops dial.
# rp_private_ip is on the same subnet as compute and storage.
rp_public_ip: ""
rp_private_ip: ""

# SSH host the orchestrator dials. Defaults to rp_public_ip if blank.
rp_ssh_host: ""
# SSH user must have passwordless sudo (NOPASSWD:ALL) or be root.
rp_ssh_user: "ubuntu"
rp_ssh_key:  "~/.ssh/id_rsa"

# ---------------------------------------------------------------------------
# Compute node (Kubernetes)                                               [AWS]
# ---------------------------------------------------------------------------
compute_private_ip: ""
compute_node_name: "compute-1"     # [USER] visible in `kubectl get nodes`
compute_ssh_host: ""
compute_ssh_user: "ubuntu"
compute_ssh_key:  "~/.ssh/id_rsa"

# ---------------------------------------------------------------------------
# Storage node (NFS + Postgres host)                                      [AWS]
# ---------------------------------------------------------------------------
storage_private_ip: ""
storage_node_name: "storage-1"     # [USER]
storage_ssh_host: ""
storage_ssh_user: "ubuntu"
storage_ssh_key:  "~/.ssh/id_rsa"

# ---------------------------------------------------------------------------
# SSH bastion (optional)                                                 [USER]
# ---------------------------------------------------------------------------
# If your laptop can only reach the RP node directly, set this to true and
# the orchestrator will ProxyJump compute/storage SSH through the RP node.
# Not needed when nodes have public IPs (the AWS-provisioned default).
ssh_jump_via_rp: false

# ---------------------------------------------------------------------------
# Network                                                                 [AWS]
# ---------------------------------------------------------------------------
# CIDR covering all 3 nodes' private IPs. Used for ufw rules between nodes.
# AWS provision sets this to the VPC CIDR.
private_subnet: "10.0.0.0/16"

# Who is allowed to SSH into the public-facing RP node.                  [AWS]
# AWS provision auto-detects your laptop's public IP. For non-AWS installs,
# tighten to your office/jump-host CIDR. 0.0.0.0/0 is open.
admin_cidr: "0.0.0.0/0"

# ---------------------------------------------------------------------------
# Wireguard (admin VPN — server lives on the RP node)
# ---------------------------------------------------------------------------
# Endpoint clients dial. Defaults to rp_public_ip if blank.              [AWS]
wg_endpoint: ""

# Wireguard tunnel subnet. Must not overlap with private_subnet.        [USER]
wg_subnet: "10.15.0.0/16"

# UDP port. Open this on RP's public security group.                    [USER]
wg_port: "51820"

# How many peer configs to pre-generate at /etc/wireguard/peers/peerN/. [USER]
wg_peers: "8"

# ---------------------------------------------------------------------------
# RKE2 / Kubernetes                                                     [USER]
# ---------------------------------------------------------------------------
rke2_version: "v1.33.6+rke2r1"

# Cluster join token. Auto-generated if blank — saved into the state dir on
# the compute node so you can later add worker/server nodes via add-node.
rke2_token: ""

# ---------------------------------------------------------------------------
# Rancher                                                               [USER]
# ---------------------------------------------------------------------------
rancher_version:  "2.12.3"
rancher_replicas: "1"

# ---------------------------------------------------------------------------
# Keycloak (admin SSO for Rancher only — runs in-cluster with embedded PG)
# ---------------------------------------------------------------------------
keycloak_replicas: "1"                              # [USER]

# Email for the Keycloak admin user. Becomes the username after first login.
keycloak_admin_email: "admin@openg2p.internal"      # [USER]

# ---------------------------------------------------------------------------
# Storage node — host PostgreSQL                                        [USER]
# ---------------------------------------------------------------------------
# Future environment automation will create per-environment databases on this
# server. Infra installs and configures it; nothing in the cluster uses it yet.
postgres_version: "16"

# Bind address — defaults to storage_private_ip if blank.
postgres_listen: ""

postgres_port: "5432"

# Superuser password — auto-generated if blank, saved at
# /etc/openg2p/secrets/postgres-superuser.env (mode 0600) on the storage node.
postgres_superuser_password: ""

# ---------------------------------------------------------------------------
# NFS (server on storage node, client on compute node)                  [USER]
# ---------------------------------------------------------------------------
nfs_export_path: "/srv/nfs"
nfs_mount_path: "/mnt/nfs"

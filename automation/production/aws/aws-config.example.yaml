# =============================================================================
# OpenG2P AWS Provisioning Configuration
# =============================================================================
# Copy to aws-config.yaml and edit:
#   cp aws-config.example.yaml aws-config.yaml
#
# Then run from this directory:
#   ./openg2p-aws-provision.sh --config aws-config.yaml
#
# This creates: 1 key pair, 3 security groups, 1 Elastic IP, 3 EC2 instances.
# It then writes (or merges into) ../prod-config.yaml so that:
#   cd .. && ./openg2p-prod.sh --config prod-config.yaml
# Just works.
#
# All AWS resources are tagged with Project=<project> for later identification
# and teardown by openg2p-aws-destroy.sh.
# =============================================================================

# ---------------------------------------------------------------------------
# Project / region
# ---------------------------------------------------------------------------
# Used as a prefix for every resource name and as the Project tag.
# Keep it short, lowercase, hyphenated.
project: "openg2p-prod"

# AWS region. Can also be set via AWS_REGION env var; this takes precedence.
region: "ap-south-1"

# ---------------------------------------------------------------------------
# VPC and subnet
# ---------------------------------------------------------------------------
# Both blank? The script queries AWS:
#   • exactly one match  → auto-picks
#   • multiple matches   → presents a numbered menu (TTY only)
#   • non-interactive    → fails with a clear list, asking you to set the value
#
# Either way, the script writes the resolved IDs back to THIS file so the
# next run is fully non-interactive.
#
# You can also fill them in upfront (skips the prompt entirely).
vpc_id:    ""
subnet_id: ""

# ---------------------------------------------------------------------------
# Network ingress
# ---------------------------------------------------------------------------
# CIDR allowed to SSH/ping the instances over the public internet.
#
# Special values:
#   ""            — auto-detect this laptop's current public IP (recommended)
#   "0.0.0.0/0"   — open to the world (only do this if you know why)
#   custom CIDR   — your office or VPN egress range, e.g. "203.0.113.0/24"
#
# This is independent of VPC choice. The security group ALSO always allows
# all traffic from the VPC CIDR for intra-VPC communication between nodes.
admin_cidr: ""

# ---------------------------------------------------------------------------
# SSH key pair
# ---------------------------------------------------------------------------
# Modes:
#   "create"     — create a new key pair in AWS, save the .pem locally
#   "existing"   — reference an already-imported AWS key pair by name
#   ""  (blank)  — interactive: lists existing keys + offers "create new"
#                  Selection is saved back to this file.
key_mode: ""

# Name of the key pair in AWS.
# Leave blank to auto-derive: "<project>-key"
key_name: ""

# Local path for the .pem file.
# Default: ./keys/<key_name>.pem.
# For "create": where the private key is saved (mode 0400).
# For "existing": path to your existing .pem (must already be present).
#
# Path notes:
#   • A leading ~ (e.g. ~/keys/mine.pem) is expanded to your home directory.
#   • Relative paths are resolved against this aws/ directory.
#   • Absolute paths (/Users/...) work as-is.
key_path: ""

# ---------------------------------------------------------------------------
# AMI
# ---------------------------------------------------------------------------
# Leave blank to auto-resolve the latest Ubuntu Server 24.04 LTS amd64 AMI
# in the configured region (Canonical owner ID 099720109477).
ubuntu_ami: ""

# ---------------------------------------------------------------------------
# Instance types  (defaults match the OpenG2P resource minimums)
# ---------------------------------------------------------------------------
rp_instance_type:      "t3a.medium"     # 2 vCPU, 4 GB
compute_instance_type: "m5a.4xlarge"    # 16 vCPU, 64 GB
storage_instance_type: "t3a.2xlarge"    # 8 vCPU, 32 GB

# ---------------------------------------------------------------------------
# Root EBS volume sizes (gp3)
# ---------------------------------------------------------------------------
# Override if you want larger disks. Minimums shown; larger is fine.
# Storage gets the most because the NFS export AND host PostgreSQL data
# both live on its root disk in v1 (separate data volume = future work).
rp_disk_gb:      64
compute_disk_gb: 128
storage_disk_gb: 256

# Optional gp3 tuning. Defaults (3000 IOPS / 125 MB-s) are fine for most
# workloads — bump for the storage node if you expect heavy DB traffic.
rp_disk_iops:        3000
rp_disk_throughput:  125
compute_disk_iops:        3000
compute_disk_throughput:  125
storage_disk_iops:        3000
storage_disk_throughput:  125

# ---------------------------------------------------------------------------
# Instance Name tags
# ---------------------------------------------------------------------------
# Leave blank to auto-derive from `project`:
#   rp_name      → <project>-reverse-proxy
#   compute_name → <project>-k8s-node-1     (the "-1" suffix is intentional;
#                                            future add-node automation uses
#                                            -2, -3, etc.)
#   storage_name → <project>-storage
# Override only if you want different names.
rp_name:      ""
compute_name: ""
storage_name: ""

# ---------------------------------------------------------------------------
# Security group names
# ---------------------------------------------------------------------------
# The script does describe-or-create per name in the chosen VPC:
#   • If a SG with the given name already exists in that VPC, REUSE it.
#     Required ingress rules are applied idempotently — anything already
#     present is left alone, anything missing is added.
#   • Otherwise, CREATE a new SG with that name and apply all rules.
#
# Leave blank to auto-derive from `project`:
#   rp_sg_name      → <project>-reverse-proxy
#   compute_sg_name → <project>-k8s-node
#   storage_sg_name → <project>-storage
#
# Override patterns:
#   • Pre-created — your infra team has already created SGs and you want to
#     reuse them. Set the names below to match their existing SGs; the
#     script will fill in any missing rules.
#   • Shared — same SG name across multiple OpenG2P installations on the
#     same VPC. Set all installs to the same name.
rp_sg_name:      ""
compute_sg_name: ""
storage_sg_name: ""

# ---------------------------------------------------------------------------
# Wireguard port
# ---------------------------------------------------------------------------
# Must match wg_port in prod-config.yaml. The RP security group opens this
# UDP port to 0.0.0.0/0 so admin laptops can connect.
wg_port: 51820

# ---------------------------------------------------------------------------
# Backup node (optional, opt-in)
# ---------------------------------------------------------------------------
# When enabled, provisions a 4th EC2 instance + a separate EBS data volume
# for the OpenG2P backup automation (../../backups/openg2p-backup.sh).
#
# Specs (defaults — adjust if needed):
#   • 4 vCPU / 8 GB RAM         — t3a.xlarge
#   • 64 GB root (gp3)
#   • 1024 GB data volume       — separate gp3 volume mounted at
#                                  /var/lib/openg2p-backup on first boot via
#                                  cloud-init userdata (formatted ext4, fstab).
#
# When disabled (default), this whole block is ignored and the provisioner
# behaves exactly as the 3-node version. Run aws-provision again later with
# enabled=true to add the backup node — existing 3 nodes are untouched.
#
# Docs: operations/deployment/automation/backups.md (Prerequisites)
backup_node:
  enabled: false

  instance_type: "t3a.xlarge"     # 4 vCPU, 16 GB (closest to 8 GB on t3a; t3a.large is 2 vCPU 8 GB)
  root_disk_gb: 64
  data_disk_gb: 1024              # separate volume for the backup repo
  data_disk_iops: 3000
  data_disk_throughput: 125

  name:    "openg2p-prod-backup"
  sg_name: "openg2p-prod-backup"
  # SSH ingress is from admin_cidr (same as other nodes); the backup node
  # also accepts SSH from RP/compute/storage SGs for orchestration.

# ---------------------------------------------------------------------------
# Output
# ---------------------------------------------------------------------------
# Path to the provision-output.yaml that this script writes.
# The orchestrator (openg2p-prod.sh) auto-detects this file next to your
# prod-config.yaml and loads it as an overlay — values here override any
# matching keys in prod-config.yaml.
#
# Default ("../provision-output.yaml") puts the file next to prod-config.yaml.
# Don't change unless you have a specific reason — auto-detection assumes
# the default location.
provision_output_file: "../provision-output.yaml"
